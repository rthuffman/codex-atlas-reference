# Validate holder slices, run tests, build release bundle; upload on version tags.
# Uses athena-codex .venv for Python 3.14.3 alignment (see README.html).

name: codex-reference-ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: codex-reference-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: rthuffman/athena-codex
          path: athena-codex
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap athena-codex venv
        run: python scripts/bootstrap_athena_codex_venv.py
        working-directory: athena-codex

      - name: Install codex-reference-ci
        run: |
          athena-codex/.venv/bin/python -m pip install -e ./deploy/tools
        working-directory: .
        env:
          ATHENA_CODEX_ROOT: ${{ github.workspace }}/athena-codex

      - name: Validate, test, build
        run: athena-codex/.venv/bin/python -m codex_reference_ci.pipeline --validate --test --build
        env:
          ATHENA_CODEX_ROOT: ${{ github.workspace }}/athena-codex

      - uses: actions/upload-artifact@v4
        with:
          name: codex-atlas-reference-bundle
          path: |
            dist/*.tar.gz*
            dist/release-manifest.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: rthuffman/athena-codex
          path: athena-codex
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap athena-codex venv
        run: python scripts/bootstrap_athena_codex_venv.py
        working-directory: athena-codex

      - name: Install codex-reference-ci
        run: athena-codex/.venv/bin/python -m pip install -e ./deploy/tools

      - name: Build and upload release
        run: |
          athena-codex/.venv/bin/python -m codex_reference_ci.pipeline --validate --build
          athena-codex/.venv/bin/python -m codex_reference_ci.release --tag "${{ github.ref_name }}"
        env:
          ATHENA_CODEX_ROOT: ${{ github.workspace }}/athena-codex
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
